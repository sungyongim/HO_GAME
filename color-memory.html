<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>HO_GAME - 색깔 기억</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nanum Pen Script', cursive;
            background: linear-gradient(135deg, #fff8f0 0%, #f0f8ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        h1 {
            font-size: 48px;
            color: #ff7b85;
            text-shadow: 3px 3px 0 #ffe66d;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 22px;
            color: #888;
            margin-bottom: 16px;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: white;
            border: 3px solid #ddd;
            border-radius: 12px;
            padding: 10px 20px;
            font-family: 'Nanum Pen Script', cursive;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 50;
            text-decoration: none;
            color: black;
        }

        .back-btn:hover { background: #f0f0f0; border-color: #ccc; }

        .top-bar {
            display: flex;
            gap: 24px;
            align-items: center;
            margin: 8px 0;
        }

        .score-display {
            font-size: 32px;
            color: #ff7b85;
        }

        .lives-display {
            font-size: 28px;
            color: #ff6b9d;
        }

        .status-text {
            font-size: 28px;
            color: #888;
            min-height: 36px;
            text-align: center;
            margin: 8px 0;
            transition: color 0.3s;
        }

        .status-text.watching { color: #ff9aa2; }
        .status-text.your-turn { color: #5ec75e; }
        .status-text.wrong { color: #ff4757; }

        .sticker-bar {
            display: flex;
            gap: 6px;
            padding: 8px 16px;
            background: white;
            border-radius: 50px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border: 2px solid #ffe0ec;
            margin: 8px 0;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 40px;
            align-items: center;
        }

        .sticker {
            font-size: 24px;
            animation: stickerPop 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes stickerPop {
            0% { transform: scale(0) rotate(-30deg); opacity: 0; }
            70% { transform: scale(1.3) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .sticker-label { font-size: 18px; color: #ccc; }

        .encourage {
            font-size: 36px;
            color: #ff7b85;
            min-height: 45px;
            text-align: center;
            margin: 8px 0;
        }

        .encourage.pop {
            animation: encouragePop 2s ease-out forwards;
        }

        @keyframes encouragePop {
            0% { opacity: 0; transform: scale(0.3); }
            15% { opacity: 1; transform: scale(1.3); }
            30% { transform: scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: scale(1) translateY(-10px); }
        }

        /* Color Buttons */
        .color-board {
            display: grid;
            grid-template-columns: repeat(2, 140px);
            grid-template-rows: repeat(2, 140px);
            gap: 16px;
            padding: 20px;
            margin: 16px 0;
        }

        .color-btn {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 6px solid rgba(0,0,0,0.15);
            cursor: pointer;
            transition: transform 0.15s, filter 0.15s, box-shadow 0.15s;
            position: relative;
            overflow: hidden;
        }

        .color-btn::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 15%;
            width: 35%;
            height: 25%;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: rotate(-30deg);
        }

        .color-btn:active {
            transform: scale(0.93);
        }

        .color-btn.lit {
            transform: scale(1.08);
            filter: brightness(1.4);
            box-shadow: 0 0 30px var(--glow-color);
        }

        .color-btn.disabled {
            opacity: 0.5;
            cursor: default;
            pointer-events: none;
        }

        .color-red {
            background: radial-gradient(circle at 35% 35%, #ff6b6b, #e74c3c);
            --glow-color: rgba(231, 76, 60, 0.6);
        }

        .color-yellow {
            background: radial-gradient(circle at 35% 35%, #ffd93d, #f9ca24);
            --glow-color: rgba(249, 202, 36, 0.6);
        }

        .color-green {
            background: radial-gradient(circle at 35% 35%, #6bcf7f, #27ae60);
            --glow-color: rgba(39, 174, 96, 0.6);
        }

        .color-blue {
            background: radial-gradient(circle at 35% 35%, #74b9ff, #2980b9);
            --glow-color: rgba(41, 128, 185, 0.6);
        }

        /* Start Button */
        .start-btn {
            padding: 16px 48px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, #ff9aa2 0%, #ff7b85 100%);
            font-family: 'Nanum Pen Script', cursive;
            font-size: 32px;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            transition: all 0.2s;
            margin: 8px 0;
            border: 4px solid #e06070;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.2);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal.show { display: flex; }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 340px;
        }

        .modal-content h2 { font-size: 42px; color: #ff7b85; margin-bottom: 10px; }
        .modal-content p { font-size: 28px; color: #666; margin: 8px 0; }
        .modal-stickers { font-size: 28px; margin: 12px 0; }

        .modal-btn {
            padding: 14px 36px;
            border: none;
            border-radius: 16px;
            font-family: 'Nanum Pen Script', cursive;
            font-size: 26px;
            color: white;
            cursor: pointer;
            margin: 8px;
            transition: all 0.2s;
        }

        .btn-restart { background: linear-gradient(135deg, #ff9aa2 0%, #ff7b85 100%); }
        .btn-home { background: linear-gradient(135deg, #87ceeb 0%, #6bb3d9 100%); }

        .modal-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        /* Heart Particle */
        .heart-particle {
            position: fixed;
            pointer-events: none;
            z-index: 200;
            font-size: 20px;
            animation: heartBurst var(--duration, 1s) cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes heartBurst {
            0% { opacity: 1; transform: translate(0, 0) scale(0.3) rotate(0deg); }
            20% { opacity: 1; transform: translate(var(--tx20), var(--ty20)) scale(1.2) rotate(var(--rot)); }
            60% { opacity: 1; transform: translate(var(--tx60), var(--ty60)) scale(1) rotate(var(--rot2)); }
            100% { opacity: 0; transform: translate(var(--tx100), var(--ty100)) scale(0.5) rotate(var(--rot3)); }
        }

        /* Help Button & Tooltip */
        .title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .help-btn {
            border-radius: 12px;
            border: 3px solid #ff7b85;
            background: white;
            color: #ff7b85;
            font-family: 'Nanum Pen Script', cursive;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 4px 12px;
            flex-shrink: 0;
        }

        .help-btn:hover {
            background: #ff7b85;
            color: white;
        }

        .help-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 150;
        }

        .help-overlay.show { display: flex; }

        .help-box {
            background: white;
            border-radius: 20px;
            padding: 28px 24px;
            max-width: 320px;
            width: 90%;
            box-shadow: 0 16px 48px rgba(0,0,0,0.25);
            text-align: left;
            position: relative;
        }

        .help-box h3 {
            font-size: 28px;
            color: #ff7b85;
            margin-bottom: 12px;
            text-align: center;
        }

        .help-box p {
            font-size: 22px;
            color: #555;
            line-height: 1.5;
            margin: 6px 0;
        }

        .help-close {
            display: block;
            margin: 16px auto 0;
            padding: 10px 32px;
            border: none;
            border-radius: 12px;
            background: #ff7b85;
            color: white;
            font-family: 'Nanum Pen Script', cursive;
            font-size: 22px;
            cursor: pointer;
        }

        /* Mobile */
        @media (max-width: 600px) {
            body { padding: 4px; }
            h1 { font-size: 28px; margin-bottom: 2px; }
            .subtitle { font-size: 14px; margin-bottom: 4px; }
            .back-btn { padding: 6px 12px; font-size: 14px; top: 6px; left: 6px; }
            .score-display { font-size: 22px; }
            .lives-display { font-size: 20px; }
            .status-text { font-size: 22px; min-height: 28px; margin: 4px 0; }
            .encourage { font-size: 24px; min-height: 28px; margin: 4px 0; }
            .help-btn { font-size: 16px; padding: 2px 10px; }
            .sticker-bar { padding: 4px 10px; min-height: 32px; margin: 3px 0; }
            .sticker { font-size: 18px; }
            .sticker-label { font-size: 14px; }

            .color-board {
                grid-template-columns: repeat(2, 110px);
                grid-template-rows: repeat(2, 110px);
                gap: 10px;
                padding: 12px;
                margin: 8px 0;
            }

            .color-btn { width: 110px; height: 110px; border-width: 5px; }
            .start-btn { font-size: 24px; padding: 10px 32px; margin: 6px 0; }
            .modal-content { padding: 28px; max-width: 300px; }
            .modal-content h2 { font-size: 36px; }
            .modal-content p { font-size: 24px; }
        }

        @media (max-width: 380px) {
            .color-board {
                grid-template-columns: repeat(2, 105px);
                grid-template-rows: repeat(2, 105px);
                gap: 10px;
            }
            .color-btn { width: 105px; height: 105px; }
        }
    </style>
</head>
<body>
    <a class="back-btn" href="index.html">← 뒤로</a>

    <div class="title-row">
        <h1>🎵 색깔 기억</h1>
        <button class="help-btn" onclick="document.getElementById('help-overlay').classList.add('show')">사용법</button>
    </div>
    <p class="subtitle">색깔 순서를 기억해요!</p>

    <!-- Help Overlay -->
    <div class="help-overlay" id="help-overlay" onclick="if(event.target===this)this.classList.remove('show')">
        <div class="help-box">
            <h3>🎵 색깔 기억 규칙</h3>
            <p>1. 색깔이 반짝이는 순서를 봐요</p>
            <p>2. 같은 순서대로 터치해요</p>
            <p>3. 라운드마다 1개씩 늘어나요</p>
            <p>4. 틀려도 2번 기회가 있어요!</p>
            <p>💡 소리도 잘 들어보면 도움돼요</p>
            <button class="help-close" onclick="document.getElementById('help-overlay').classList.remove('show')">알겠어요!</button>
        </div>
    </div>

    <div class="top-bar">
        <div class="score-display">라운드: <span id="round">0</span></div>
        <div class="lives-display">기회: <span id="lives">❤️❤️</span></div>
    </div>

    <div class="sticker-bar" id="sticker-bar">
        <span class="sticker-label" id="sticker-label">스티커를 모아봐요!</span>
    </div>

    <div class="encourage" id="encourage"></div>

    <div class="status-text" id="status">버튼을 눌러 시작하세요!</div>

    <div class="color-board" id="color-board">
        <div class="color-btn color-red disabled" data-color="0"></div>
        <div class="color-btn color-yellow disabled" data-color="1"></div>
        <div class="color-btn color-green disabled" data-color="2"></div>
        <div class="color-btn color-blue disabled" data-color="3"></div>
    </div>

    <button class="start-btn" id="start-btn" onclick="startGame()">🎵 게임 시작!</button>

    <!-- Game Over Modal -->
    <div class="modal" id="game-over-modal">
        <div class="modal-content">
            <h2 id="modal-title">🎉 잘했어요!</h2>
            <p id="modal-score"></p>
            <p id="modal-detail"></p>
            <div class="modal-stickers" id="modal-stickers"></div>
            <button class="modal-btn btn-restart" onclick="restartGame()">다시하기</button>
            <button class="modal-btn btn-home" onclick="window.location.href='index.html'">홈으로</button>
        </div>
    </div>

    <script>
        // ============ Sound System ============
        let audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }
        function playTone(freq, duration, type, vol) {
            try {
                const ctx = getAudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type || 'sine';
                osc.frequency.value = freq;
                gain.gain.value = vol || 0.15;
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        }

        // Each color has a unique note: Do Mi Sol Do (octave)
        const COLOR_TONES = [
            { freq: 262, type: 'sine' },   // Red = C4 (Do)
            { freq: 330, type: 'sine' },   // Yellow = E4 (Mi)
            { freq: 392, type: 'sine' },   // Green = G4 (Sol)
            { freq: 523, type: 'sine' },   // Blue = C5 (Do)
        ];

        function playColorTone(colorIdx) {
            const tone = COLOR_TONES[colorIdx];
            playTone(tone.freq, 0.35, tone.type, 0.2);
        }

        function playSuccessSound() {
            playTone(523, 0.12, 'sine', 0.15);
            setTimeout(() => playTone(659, 0.12, 'sine', 0.15), 80);
            setTimeout(() => playTone(784, 0.15, 'sine', 0.15), 160);
        }

        function playComboSound() {
            playTone(784, 0.1, 'sine', 0.18);
            setTimeout(() => playTone(988, 0.1, 'sine', 0.18), 70);
            setTimeout(() => playTone(1175, 0.15, 'sine', 0.18), 140);
            setTimeout(() => playTone(1318, 0.2, 'triangle', 0.12), 210);
        }

        function playFailSound() {
            playTone(200, 0.3, 'square', 0.08);
            setTimeout(() => playTone(180, 0.4, 'square', 0.08), 200);
        }

        function playStickerSound() {
            playTone(880, 0.08, 'sine', 0.12);
            setTimeout(() => playTone(1108, 0.08, 'sine', 0.12), 60);
            setTimeout(() => playTone(1318, 0.15, 'triangle', 0.1), 120);
        }

        function playGameOverSound() {
            playTone(523, 0.2, 'sine', 0.12);
            setTimeout(() => playTone(494, 0.2, 'sine', 0.12), 200);
            setTimeout(() => playTone(440, 0.2, 'sine', 0.12), 400);
            setTimeout(() => playTone(392, 0.4, 'sine', 0.12), 600);
        }

        // ============ Heart Explosion ============
        function spawnHeartExplosion(x, y, count) {
            const hearts = ['❤️', '💕', '💗', '💖', '💓'];
            for (let i = 0; i < (count || 18); i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.6;
                const dist = 60 + Math.random() * 100;
                const tx100 = Math.cos(angle) * dist;
                const ty100 = Math.sin(angle) * dist + 30;
                const tx60 = Math.cos(angle) * dist * 0.7;
                const ty60 = Math.sin(angle) * dist * 0.7 - 10;
                const tx20 = Math.cos(angle) * dist * 0.3;
                const ty20 = Math.sin(angle) * dist * 0.3 - 20;
                const rot = (Math.random() - 0.5) * 60;
                const duration = 0.7 + Math.random() * 0.6;
                const size = 14 + Math.random() * 14;
                heart.style.cssText = `left:${x}px;top:${y}px;font-size:${size}px;--tx20:${tx20}px;--ty20:${ty20}px;--tx60:${tx60}px;--ty60:${ty60}px;--tx100:${tx100}px;--ty100:${ty100}px;--rot:${rot}deg;--rot2:${rot*1.5}deg;--rot3:${rot*2}deg;--duration:${duration}s;`;
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), duration * 1000 + 50);
            }
        }

        // ============ Sticker System ============
        const STICKER_MILESTONES = [2, 4, 6, 8, 10, 15];
        const STICKER_ICONS = ['⭐', '🌟', '🏅', '🎖️', '🏆', '👑'];
        let earnedStickers = [];
        let lastStickerIndex = -1;

        function checkStickerMilestone(round) {
            for (let i = lastStickerIndex + 1; i < STICKER_MILESTONES.length; i++) {
                if (round >= STICKER_MILESTONES[i]) {
                    lastStickerIndex = i;
                    earnedStickers.push(STICKER_ICONS[i]);
                    addStickerToBar(STICKER_ICONS[i]);
                    playStickerSound();
                    const bar = document.getElementById('sticker-bar');
                    const rect = bar.getBoundingClientRect();
                    spawnHeartExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2, 12);
                } else break;
            }
        }

        function addStickerToBar(icon) {
            const bar = document.getElementById('sticker-bar');
            const label = document.getElementById('sticker-label');
            if (label) label.remove();
            const s = document.createElement('span');
            s.className = 'sticker';
            s.textContent = icon;
            bar.appendChild(s);
        }

        function resetStickers() {
            earnedStickers = [];
            lastStickerIndex = -1;
            const bar = document.getElementById('sticker-bar');
            bar.innerHTML = '<span class="sticker-label" id="sticker-label">스티커를 모아봐요!</span>';
        }

        // ============ Encouragement ============
        const ENCOURAGE_MSGS = [
            '현오~ 잘했어요!!!',
            '현오~ 대단해요!!!',
            '현오~ 최고예요!!!',
            '현오~ 멋져요!!!',
            '현오~ 기억력 천재!!!',
        ];

        const FAIL_MSGS = [
            '괜찮아! 다시 해보자!',
            '현오~ 할 수 있어!',
            '천천히 해도 괜찮아!',
        ];

        function showEncourage(isFail) {
            const el = document.getElementById('encourage');
            const msgs = isFail ? FAIL_MSGS : ENCOURAGE_MSGS;
            el.textContent = msgs[Math.floor(Math.random() * msgs.length)];
            el.className = 'encourage';
            void el.offsetHeight;
            el.className = 'encourage pop';
            if (!isFail) {
                const rect = el.getBoundingClientRect();
                spawnHeartExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2, 22);
            }
        }

        // ============ Game State ============
        // States: idle, showing, input, gameover
        let gameState = 'idle';
        let sequence = [];
        let playerIndex = 0;
        let round = 0;
        let lives = 2;
        let maxRound = 0;
        let showingIndex = 0;
        let showTimer = null;
        let speedMult = 1.0;

        const buttons = document.querySelectorAll('.color-btn');

        function initButtons() {
            buttons.forEach(btn => {
                const handler = (e) => {
                    e.preventDefault();
                    const colorIdx = parseInt(btn.dataset.color);
                    handleInput(colorIdx);
                };
                btn.addEventListener('touchstart', handler, { passive: false });
                btn.addEventListener('mousedown', handler);
            });
        }

        function setButtonsEnabled(enabled) {
            buttons.forEach(btn => {
                btn.classList.toggle('disabled', !enabled);
            });
        }

        function lightButton(colorIdx, duration) {
            const btn = buttons[colorIdx];
            btn.classList.add('lit');
            playColorTone(colorIdx);
            setTimeout(() => btn.classList.remove('lit'), duration || 400);
        }

        function startGame() {
            sequence = [];
            playerIndex = 0;
            round = 0;
            lives = 2;
            maxRound = 0;
            speedMult = 1.0;
            gameState = 'idle';
            resetStickers();
            document.getElementById('round').textContent = '0';
            updateLives();
            document.getElementById('encourage').textContent = '';
            document.getElementById('start-btn').style.display = 'none';
            setButtonsEnabled(false);

            nextRound();
        }

        function nextRound() {
            round++;
            maxRound = Math.max(maxRound, round);
            document.getElementById('round').textContent = round;
            playerIndex = 0;

            // Add a new color to sequence
            sequence.push(Math.floor(Math.random() * 4));

            // Show the sequence
            gameState = 'showing';
            const status = document.getElementById('status');
            status.textContent = '잘 봐요! 👀';
            status.className = 'status-text watching';
            setButtonsEnabled(false);

            showingIndex = 0;
            setTimeout(() => showSequence(), 600);
        }

        function showSequence() {
            if (showingIndex >= sequence.length) {
                // Done showing, player's turn
                gameState = 'input';
                const status = document.getElementById('status');
                status.textContent = '현오 차례! 🎵';
                status.className = 'status-text your-turn';
                setButtonsEnabled(true);
                return;
            }

            lightButton(sequence[showingIndex], 450);
            showingIndex++;

            // Speed increases with round + speedMult
            const delay = Math.max(300, (700 - round * 20) * speedMult);
            showTimer = setTimeout(() => showSequence(), delay);
        }

        function handleInput(colorIdx) {
            if (gameState !== 'input') return;

            lightButton(colorIdx, 250);

            if (colorIdx === sequence[playerIndex]) {
                // Correct
                playerIndex++;
                if (playerIndex >= sequence.length) {
                    // Round complete!
                    gameState = 'waiting';
                    setButtonsEnabled(false);
                    playSuccessSound();
                    checkStickerMilestone(round);
                    showEncourage(false);
                    speedMult *= 0.97; // 3% faster each round

                    // Heart explosion every round
                    const board = document.getElementById('color-board');
                    const rect = board.getBoundingClientRect();
                    spawnHeartExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2, 18);

                    setTimeout(() => nextRound(), 1500);
                }
            } else {
                // Wrong!
                gameState = 'waiting';
                setButtonsEnabled(false);
                playFailSound();
                lives--;
                updateLives();

                const status = document.getElementById('status');

                if (lives > 0) {
                    // Retry this round
                    status.textContent = '다시 보여줄게! 👀';
                    status.className = 'status-text wrong';
                    showEncourage(true);

                    // Replay the sequence
                    setTimeout(() => {
                        playerIndex = 0;
                        showingIndex = 0;
                        gameState = 'showing';
                        status.textContent = '잘 봐요! 👀';
                        status.className = 'status-text watching';
                        setTimeout(() => showSequence(), 600);
                    }, 1500);
                } else {
                    // Game over
                    status.textContent = '';
                    setTimeout(() => showGameOver(), 500);
                }
            }
        }

        function updateLives() {
            const livesEl = document.getElementById('lives');
            livesEl.textContent = '❤️'.repeat(lives) + '🤍'.repeat(2 - lives);
        }

        function showGameOver() {
            gameState = 'gameover';
            const modal = document.getElementById('game-over-modal');
            const title = maxRound >= 5 ? '🎉 대단해요!' : '🎵 잘했어요!';
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-score').textContent = `라운드 ${maxRound}까지 성공!`;
            document.getElementById('modal-detail').textContent = `${sequence.length - 1}개 색깔을 기억했어요`;
            document.getElementById('modal-stickers').textContent = earnedStickers.length > 0
                ? '획득 스티커: ' + earnedStickers.join(' ')
                : '';
            modal.classList.add('show');

            spawnHeartExplosion(window.innerWidth / 2, window.innerHeight / 2, 25);
            if (maxRound >= 5) playComboSound();
            else playGameOverSound();
        }

        function restartGame() {
            document.getElementById('game-over-modal').classList.remove('show');
            startGame();
        }

        // Prevent scroll
        document.body.addEventListener('touchmove', (e) => {
            if (e.target.closest('.color-board')) e.preventDefault();
        }, { passive: false });

        // Init
        initButtons();
    </script>
</body>
</html>
