<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>HO_GAME - 그림 퍼즐</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nanum Pen Script', cursive;
            background: linear-gradient(135deg, #fff8f0 0%, #f0f8ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        h1 {
            font-size: 48px;
            color: #d0a030;
            text-shadow: 3px 3px 0 #ffe66d;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 22px;
            color: #888;
            margin-bottom: 16px;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: white;
            border: 3px solid #ddd;
            border-radius: 12px;
            padding: 10px 20px;
            font-family: 'Nanum Pen Script', cursive;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 50;
            text-decoration: none;
            color: black;
        }

        .back-btn:hover { background: #f0f0f0; border-color: #ccc; }

        .top-bar {
            display: flex;
            gap: 24px;
            align-items: center;
            margin: 8px 0;
        }

        .score-display {
            font-size: 32px;
            color: #d0a030;
        }

        .sticker-bar {
            display: flex;
            gap: 6px;
            padding: 8px 16px;
            background: white;
            border-radius: 50px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            border: 2px solid #f5e6b8;
            margin: 8px 0;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 40px;
            align-items: center;
        }

        .sticker {
            font-size: 24px;
            animation: stickerPop 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes stickerPop {
            0% { transform: scale(0) rotate(-30deg); opacity: 0; }
            70% { transform: scale(1.3) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .sticker-label { font-size: 18px; color: #ccc; }

        .encourage {
            font-size: 36px;
            color: #d0a030;
            min-height: 45px;
            text-align: center;
            margin: 8px 0;
        }

        .encourage.pop {
            animation: encouragePop 2s ease-out forwards;
        }

        @keyframes encouragePop {
            0% { opacity: 0; transform: scale(0.3); }
            15% { opacity: 1; transform: scale(1.3); }
            30% { transform: scale(1); }
            80% { opacity: 1; }
            100% { opacity: 0; transform: scale(1) translateY(-10px); }
        }

        /* Difficulty */
        .diff-container {
            display: flex;
            gap: 16px;
            margin: 12px 0;
        }

        .diff-btn {
            padding: 12px 28px;
            border: 3px solid #d0a030;
            border-radius: 16px;
            background: white;
            font-family: 'Nanum Pen Script', cursive;
            font-size: 24px;
            color: #d0a030;
            cursor: pointer;
            transition: all 0.2s;
        }

        .diff-btn:hover, .diff-btn.active {
            background: #d0a030;
            color: white;
        }

        /* Board */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 6px;
            padding: 10px;
            background: #fffde8;
            border-radius: 16px;
            border: 4px solid #e8d88c;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            margin: 12px 0;
        }

        .tile {
            width: 100px;
            height: 100px;
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
            background: white;
            border: 3px solid #e8d88c;
            gap: 2px;
        }

        .tile:active {
            transform: scale(0.95);
        }

        .tile .tile-num {
            font-size: 28px;
            font-weight: bold;
            color: #666;
            line-height: 1;
        }

        .tile .tile-emoji {
            font-size: 36px;
            line-height: 1;
        }

        .tile.empty {
            background: transparent;
            border: 3px dashed #ddd;
            cursor: default;
        }

        .tile.correct {
            background: #f0ffe0;
            border-color: #a0d060;
            animation: correctPulse 0.4s ease-out;
        }

        @keyframes correctPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); box-shadow: 0 0 12px rgba(160,208,96,0.5); }
            100% { transform: scale(1); }
        }

        .tile.sliding {
            transition: transform 0.15s ease-out;
        }

        /* Reference image */
        .reference {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 8px 12px;
            background: white;
            border-radius: 12px;
            border: 2px dashed #ddd;
            margin: 8px 0;
            max-width: 300px;
        }

        .reference span {
            font-size: 20px;
        }

        .reference-label {
            font-size: 18px;
            color: #aaa;
            margin-bottom: 4px;
            width: 100%;
            text-align: center;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal.show { display: flex; }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 340px;
        }

        .modal-content h2 { font-size: 42px; color: #d0a030; margin-bottom: 10px; }
        .modal-content p { font-size: 28px; color: #666; margin: 8px 0; }
        .modal-stickers { font-size: 28px; margin: 12px 0; }

        .modal-btn {
            padding: 14px 36px;
            border: none;
            border-radius: 16px;
            font-family: 'Nanum Pen Script', cursive;
            font-size: 26px;
            color: white;
            cursor: pointer;
            margin: 8px;
            transition: all 0.2s;
        }

        .btn-restart { background: linear-gradient(135deg, #e8d060 0%, #d0a030 100%); }
        .btn-home { background: linear-gradient(135deg, #87ceeb 0%, #6bb3d9 100%); }

        .modal-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        /* Heart Particle */
        .heart-particle {
            position: fixed;
            pointer-events: none;
            z-index: 200;
            font-size: 20px;
            animation: heartBurst var(--duration, 1s) cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes heartBurst {
            0% { opacity: 1; transform: translate(0, 0) scale(0.3) rotate(0deg); }
            20% { opacity: 1; transform: translate(var(--tx20), var(--ty20)) scale(1.2) rotate(var(--rot)); }
            60% { opacity: 1; transform: translate(var(--tx60), var(--ty60)) scale(1) rotate(var(--rot2)); }
            100% { opacity: 0; transform: translate(var(--tx100), var(--ty100)) scale(0.5) rotate(var(--rot3)); }
        }

        /* Help Button & Tooltip */
        .title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .help-btn {
            border-radius: 12px;
            border: 3px solid #d0a030;
            background: white;
            color: #d0a030;
            font-family: 'Nanum Pen Script', cursive;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 4px 12px;
            flex-shrink: 0;
        }

        .help-btn:hover {
            background: #d0a030;
            color: white;
        }

        .help-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 150;
        }

        .help-overlay.show { display: flex; }

        .help-box {
            background: white;
            border-radius: 20px;
            padding: 28px 24px;
            max-width: 320px;
            width: 90%;
            box-shadow: 0 16px 48px rgba(0,0,0,0.25);
            text-align: left;
            position: relative;
        }

        .help-box h3 {
            font-size: 28px;
            color: #d0a030;
            margin-bottom: 12px;
            text-align: center;
        }

        .help-box p {
            font-size: 22px;
            color: #555;
            line-height: 1.5;
            margin: 6px 0;
        }

        .help-close {
            display: block;
            margin: 16px auto 0;
            padding: 10px 32px;
            border: none;
            border-radius: 12px;
            background: #d0a030;
            color: white;
            font-family: 'Nanum Pen Script', cursive;
            font-size: 22px;
            cursor: pointer;
        }

        /* Mobile */
        @media (max-width: 600px) {
            body { padding: 4px; }
            h1 { font-size: 28px; margin-bottom: 2px; }
            .subtitle { font-size: 14px; margin-bottom: 4px; }
            .back-btn { padding: 6px 12px; font-size: 14px; top: 6px; left: 6px; }
            .score-display { font-size: 22px; }
            .encourage { font-size: 24px; min-height: 28px; margin: 4px 0; }
            .help-btn { font-size: 16px; padding: 2px 10px; }
            .sticker-bar { padding: 4px 10px; min-height: 32px; margin: 3px 0; }
            .sticker { font-size: 18px; }
            .sticker-label { font-size: 14px; }

            .board {
                grid-template-columns: repeat(3, 85px);
                grid-template-rows: repeat(3, 85px);
                gap: 4px;
                padding: 6px;
            }

            .tile {
                width: 85px;
                height: 85px;
            }

            .tile .tile-num { font-size: 22px; }
            .tile .tile-emoji { font-size: 28px; }

            .diff-btn { padding: 8px 18px; font-size: 18px; }
            .reference { padding: 6px 10px; margin: 4px 0; }
            .reference span { font-size: 18px; }
            .modal-content { padding: 28px; max-width: 300px; }
            .modal-content h2 { font-size: 36px; }
            .modal-content p { font-size: 24px; }
        }

        @media (max-width: 380px) {
            .board {
                grid-template-columns: repeat(3, 80px);
                grid-template-rows: repeat(3, 80px);
            }
            .tile { width: 80px; height: 80px; }
            .tile .tile-emoji { font-size: 26px; }
        }
    </style>
</head>
<body>
    <a class="back-btn" href="index.html">← 뒤로</a>

    <div class="title-row">
        <h1>🧩 그림 퍼즐</h1>
        <button class="help-btn" onclick="document.getElementById('help-overlay').classList.add('show')">사용법</button>
    </div>
    <p class="subtitle">숫자를 순서대로 맞춰요!</p>

    <!-- Help Overlay -->
    <div class="help-overlay" id="help-overlay" onclick="if(event.target===this)this.classList.remove('show')">
        <div class="help-box">
            <h3>🧩 그림 퍼즐 규칙</h3>
            <p>1. 빈칸 옆 타일을 터치해요</p>
            <p>2. 숫자를 1~8 순서대로 맞춰요</p>
            <p>3. 시간제한 없으니 천천히!</p>
            <p>4. 제자리에 온 타일은 초록색!</p>
            <p>💡 위에 완성 모습을 참고해요</p>
            <button class="help-close" onclick="document.getElementById('help-overlay').classList.remove('show')">알겠어요!</button>
        </div>
    </div>

    <div class="top-bar">
        <div class="score-display">이동: <span id="moves">0</span>번</div>
    </div>

    <div class="sticker-bar" id="sticker-bar">
        <span class="sticker-label" id="sticker-label">스티커를 모아봐요!</span>
    </div>

    <div class="encourage" id="encourage"></div>

    <div class="diff-container" id="diff-container">
        <button class="diff-btn active" onclick="setDifficulty('easy')">쉬움 (4번 섞기)</button>
        <button class="diff-btn" onclick="setDifficulty('normal')">보통 (10번 섞기)</button>
    </div>

    <div class="reference" id="reference">
        <div class="reference-label">완성 모습</div>
    </div>

    <div class="board" id="board"></div>

    <!-- Game Over Modal -->
    <div class="modal" id="game-over-modal">
        <div class="modal-content">
            <h2>🎉 완성!</h2>
            <p id="modal-moves"></p>
            <div class="modal-stickers" id="modal-stickers"></div>
            <button class="modal-btn btn-restart" onclick="restartGame()">다시하기</button>
            <button class="modal-btn btn-home" onclick="window.location.href='index.html'">홈으로</button>
        </div>
    </div>

    <script>
        // ============ Sound System ============
        let audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }
        function playTone(freq, duration, type, vol) {
            try {
                const ctx = getAudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type || 'sine';
                osc.frequency.value = freq;
                gain.gain.value = vol || 0.15;
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        }
        function playSlideSound() {
            playTone(440, 0.06, 'sine', 0.1);
            setTimeout(() => playTone(554, 0.06, 'sine', 0.1), 40);
        }
        function playCorrectSound() {
            playTone(523, 0.12, 'sine', 0.15);
            setTimeout(() => playTone(659, 0.12, 'sine', 0.15), 80);
            setTimeout(() => playTone(784, 0.15, 'sine', 0.15), 160);
        }
        function playComboSound() {
            playTone(784, 0.1, 'sine', 0.18);
            setTimeout(() => playTone(988, 0.1, 'sine', 0.18), 70);
            setTimeout(() => playTone(1175, 0.15, 'sine', 0.18), 140);
            setTimeout(() => playTone(1318, 0.2, 'triangle', 0.12), 210);
        }
        function playStickerSound() {
            playTone(880, 0.08, 'sine', 0.12);
            setTimeout(() => playTone(1108, 0.08, 'sine', 0.12), 60);
            setTimeout(() => playTone(1318, 0.15, 'triangle', 0.1), 120);
        }
        function playFailSound() {
            playTone(330, 0.15, 'square', 0.06);
            setTimeout(() => playTone(277, 0.2, 'square', 0.06), 120);
        }

        // ============ Heart Explosion ============
        function spawnHeartExplosion(x, y, count) {
            const hearts = ['❤️', '💕', '💗', '💖', '💓'];
            for (let i = 0; i < (count || 18); i++) {
                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.6;
                const dist = 60 + Math.random() * 100;
                const tx100 = Math.cos(angle) * dist;
                const ty100 = Math.sin(angle) * dist + 30;
                const tx60 = Math.cos(angle) * dist * 0.7;
                const ty60 = Math.sin(angle) * dist * 0.7 - 10;
                const tx20 = Math.cos(angle) * dist * 0.3;
                const ty20 = Math.sin(angle) * dist * 0.3 - 20;
                const rot = (Math.random() - 0.5) * 60;
                const duration = 0.7 + Math.random() * 0.6;
                const size = 14 + Math.random() * 14;
                heart.style.cssText = `left:${x}px;top:${y}px;font-size:${size}px;--tx20:${tx20}px;--ty20:${ty20}px;--tx60:${tx60}px;--ty60:${ty60}px;--tx100:${tx100}px;--ty100:${ty100}px;--rot:${rot}deg;--rot2:${rot*1.5}deg;--rot3:${rot*2}deg;--duration:${duration}s;`;
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), duration * 1000 + 50);
            }
        }

        // ============ Sticker System ============
        const STICKER_MILESTONES = [1, 2, 4, 6, 10, 15];
        const STICKER_ICONS = ['⭐', '🌟', '🏅', '🎖️', '🏆', '👑'];
        let earnedStickers = [];
        let lastStickerIndex = -1;
        let totalPuzzlesSolved = 0;

        function checkStickerMilestone(count) {
            for (let i = lastStickerIndex + 1; i < STICKER_MILESTONES.length; i++) {
                if (count >= STICKER_MILESTONES[i]) {
                    lastStickerIndex = i;
                    earnedStickers.push(STICKER_ICONS[i]);
                    addStickerToBar(STICKER_ICONS[i]);
                    playStickerSound();
                    const bar = document.getElementById('sticker-bar');
                    const rect = bar.getBoundingClientRect();
                    spawnHeartExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2, 12);
                } else break;
            }
        }

        function addStickerToBar(icon) {
            const bar = document.getElementById('sticker-bar');
            const label = document.getElementById('sticker-label');
            if (label) label.remove();
            const s = document.createElement('span');
            s.className = 'sticker';
            s.textContent = icon;
            bar.appendChild(s);
        }

        function resetStickers() {
            earnedStickers = [];
            lastStickerIndex = -1;
            const bar = document.getElementById('sticker-bar');
            bar.innerHTML = '<span class="sticker-label" id="sticker-label">스티커를 모아봐요!</span>';
        }

        // ============ Encouragement ============
        const ENCOURAGE_MSGS = [
            '현오~ 잘했어요!!!',
            '현오~ 대단해요!!!',
            '현오~ 최고예요!!!',
            '현오~ 멋져요!!!',
            '현오~ 천재!!!',
        ];

        function showEncourage() {
            const el = document.getElementById('encourage');
            el.textContent = ENCOURAGE_MSGS[Math.floor(Math.random() * ENCOURAGE_MSGS.length)];
            el.className = 'encourage';
            void el.offsetHeight;
            el.className = 'encourage pop';
            const rect = el.getBoundingClientRect();
            spawnHeartExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2, 22);
        }

        // ============ Game State ============
        const TILE_EMOJIS = ['', '🦕', '🦖', '🤖', '🚗', '🦎', '🐊', '🥚', '🦴'];
        // board[i] = tile number at position i (0 = empty, 1-8 = tiles)
        // Goal state: [1, 2, 3, 4, 5, 6, 7, 8, 0]
        let board = [];
        let emptyPos = 8;
        let moves = 0;
        let difficulty = 'easy';
        let shuffleCount = 4;
        let locked = false;

        function setDifficulty(diff) {
            difficulty = diff;
            shuffleCount = diff === 'easy' ? 4 : 10;
            document.querySelectorAll('.diff-btn').forEach((b, i) => {
                b.classList.toggle('active', (i === 0 && diff === 'easy') || (i === 1 && diff === 'normal'));
            });
            startGame();
        }

        function startGame() {
            moves = 0;
            locked = false;
            document.getElementById('moves').textContent = '0';
            document.getElementById('encourage').textContent = '';

            // Start from solved state and shuffle by making valid moves
            board = [1, 2, 3, 4, 5, 6, 7, 8, 0];
            emptyPos = 8;

            // Shuffle by making random valid moves
            let lastMove = -1;
            for (let i = 0; i < shuffleCount; i++) {
                const neighbors = getNeighbors(emptyPos);
                // Don't undo the last move
                const filtered = neighbors.filter(n => n !== lastMove);
                const pick = filtered[Math.floor(Math.random() * filtered.length)];
                lastMove = emptyPos;
                swapTiles(pick, emptyPos);
                emptyPos = pick;
            }

            renderBoard();
            renderReference();
        }

        function getNeighbors(pos) {
            const row = Math.floor(pos / 3);
            const col = pos % 3;
            const neighbors = [];
            if (row > 0) neighbors.push(pos - 3); // up
            if (row < 2) neighbors.push(pos + 3); // down
            if (col > 0) neighbors.push(pos - 1); // left
            if (col < 2) neighbors.push(pos + 1); // right
            return neighbors;
        }

        function swapTiles(a, b) {
            [board[a], board[b]] = [board[b], board[a]];
        }

        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const tile = document.createElement('div');
                const val = board[i];
                if (val === 0) {
                    tile.className = 'tile empty';
                } else {
                    tile.className = 'tile';
                    // Check if tile is in correct position
                    if (val === i + 1) {
                        tile.classList.add('correct');
                    }
                    tile.innerHTML = `
                        <span class="tile-num">${val}</span>
                        <span class="tile-emoji">${TILE_EMOJIS[val]}</span>
                    `;
                    tile.addEventListener('click', () => tapTile(i));
                    tile.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        tapTile(i);
                    }, { passive: false });
                }
                boardEl.appendChild(tile);
            }
        }

        function renderReference() {
            const ref = document.getElementById('reference');
            ref.innerHTML = '<div class="reference-label">완성 모습</div>';
            for (let i = 1; i <= 8; i++) {
                const span = document.createElement('span');
                span.textContent = `${i}${TILE_EMOJIS[i]}`;
                ref.appendChild(span);
            }
        }

        function tapTile(pos) {
            if (locked) return;
            if (board[pos] === 0) return;

            // Check if adjacent to empty
            const neighbors = getNeighbors(pos);
            if (!neighbors.includes(emptyPos)) {
                playFailSound();
                return;
            }

            // Slide tile
            swapTiles(pos, emptyPos);
            emptyPos = pos;
            moves++;
            document.getElementById('moves').textContent = moves;
            playSlideSound();

            renderBoard();

            // Encourage every 3 moves
            if (moves % 3 === 0) {
                showEncourage();
            }

            // Check correct tiles for feedback
            let correctCount = 0;
            for (let i = 0; i < 8; i++) {
                if (board[i] === i + 1) correctCount++;
            }

            // Check win
            if (isSolved()) {
                locked = true;
                totalPuzzlesSolved++;
                checkStickerMilestone(totalPuzzlesSolved);
                playCorrectSound();
                setTimeout(() => showGameOver(), 600);
            }
        }

        function isSolved() {
            for (let i = 0; i < 8; i++) {
                if (board[i] !== i + 1) return false;
            }
            return board[8] === 0;
        }

        function showGameOver() {
            const modal = document.getElementById('game-over-modal');
            document.getElementById('modal-moves').textContent = `${moves}번 만에 완성!`;
            document.getElementById('modal-stickers').textContent = earnedStickers.length > 0
                ? '획득 스티커: ' + earnedStickers.join(' ')
                : '';
            modal.classList.add('show');
            spawnHeartExplosion(window.innerWidth / 2, window.innerHeight / 2, 25);
            playComboSound();
        }

        function restartGame() {
            document.getElementById('game-over-modal').classList.remove('show');
            startGame();
        }

        // Prevent scroll
        document.body.addEventListener('touchmove', (e) => {
            if (e.target.closest('.board')) e.preventDefault();
        }, { passive: false });

        // Start
        startGame();
    </script>
</body>
</html>
